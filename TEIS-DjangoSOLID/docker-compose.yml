services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=tienda_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_password

  web_django:
    image: web_django:latest
    # CAMBIO 1: Usamos Gunicorn en lugar de runserver
    # 'Tienda' es el nombre de la carpeta donde está wsgi.py
    command: gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    # NOTA: Ya no hay sección 'ports' aquí. Django está aislado.
    depends_on:
      - db
    environment:
      - DB_NAME=tienda_db
      - DB_USER=postgres
      - DB_PASSWORD=secret_password
      - DB_HOST=db
      - DB_PORT=5432

  # CAMBIO 3: Agregamos el Microservicio Flask (Strangler Pattern)
  pagos_flask:
    image: pagos_flask:latest
    ports:
      - "5000:5000"  # Solo para pruebas iniciales, luego lo cerraremos
    # Sin dependencias de DB, Flask es totalmente independiente

  # CAMBIO 2: Agregamos el servicio Nginx
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"  # Nginx es el único que da la cara a internet
    volumes:
      # Inyectamos nuestro archivo de configuración en el contenedor
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web_django
      - pagos_flask

volumes:
  postgres_data: