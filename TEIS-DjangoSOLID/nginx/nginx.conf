# nginx/nginx.conf
upstream django_v1 {
    server web_django:8000;
}

upstream flask_v2 {
    server pagos_flask:5000;
}

server {
    listen 80;
    client_max_body_size 100M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /api/v2/comprar {
        # Pasar EXACTAMENTE como viene
        proxy_pass http://flask_v2;
        
        # HTTP 1.1 para manejar Transfer-Encoding: chunked
        proxy_http_version 1.1;
        
        # Headers standard
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CRÍTICO: permitir que Postman envíe chunked sin Content-Length
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://django_v1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
