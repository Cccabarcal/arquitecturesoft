# nginx/nginx.conf
upstream django_v1 {
    server web_django:8000;
}

upstream flask_v2 {
    server pagos_flask:5000;
}

server {
    listen 80;
    client_max_body_size 100M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /api/v2/comprar {
        # CRUCIAL: pasar request body sin modificar
        proxy_pass http://flask_v2;
        
        # Versión HTTP 1.1 es obligatoria para ciertas cosas
        proxy_http_version 1.1;
        
        # Informar al backend sobre el cliente real
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CRÍTICO: respetar el Content-Length original
        proxy_set_header Content-Length $content_length;
        
        # Pasar headers de contenido sin modificar
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
    }

    location / {
        proxy_pass http://django_v1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
