# nginx/nginx.conf
# Proxy Inverso: Nginx enruta el tráfico a Django/Gunicorn y Flask/Pagos

# 1. Definimos nuestro sistema backend v1 (Django + Gunicorn)
upstream django_v1 {
    server web_django:8000;
}

# 2. Definimos nuestro microservicio backend v2 (Flask + Pagos)
upstream flask_v2 {
    server pagos_flask:5000;
}

server {
    # Nginx escuchará en el puerto web estándar (80)
    listen 80;

    # Ignorar logs de favicon para no saturar el servidor
    location = /favicon.ico { access_log off; log_not_found off; }

    # RUTA NEW: Estrangulamos la función de compra y la mandamos a Flask
    # Esta es la punta del patrón Strangler - nuevas funciones van aquí
    location /api/v2/comprar {
        proxy_pass http://flask_v2;
        
        # Headers que SIEMPRE se envían
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Pasar TODOS los headers del cliente original
        proxy_pass_request_headers on;
        
        # Importante: permitir que el body se pase correctamente
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # RUTA VIEJA: Sigue yendo a Django (v1)
    # Todo lo demás se mantiene en el monolito por ahora
    location / {
        proxy_pass http://django_v1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
